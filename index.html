<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Subway Fari ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Nunito', sans-serif;
            touch-action: none; /* Блокируем скролл страницы на телефоне */
            user-select: none;
            -webkit-user-select: none;
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* Зона, которая ловит свайпы, чтобы они не ломались */
        #touch-zone {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5;
        }

        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .hud-box {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            padding: 8px 15px;
            border-radius: 20px;
            border: 3px solid #ffb6c1;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            color: #d81b60;
            font-size: 22px;
            font-weight: 900;
        }

        #score-board { top: 20px; left: 20px; }
        #progress-board { top: 20px; right: 20px; color: #4682B4; border-color: #4682B4;}

        #danger-warning {
            position: absolute;
            top: 80px;
            width: 100%;
            text-align: center;
            color: #ff0000;
            font-size: 26px;
            font-weight: 900;
            text-shadow: 2px 2px 0px #fff, -2px -2px 0px #fff, 2px -2px 0px #fff, -2px 2px 0px #fff;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .controls {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 30px;
            pointer-events: auto;
        }

        .btn {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.8);
            border: 4px solid #d81b60;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            color: #d81b60;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            cursor: pointer;
        }
        .btn:active { background: #ffb6c1; transform: scale(0.9); }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: auto;
            text-align: center;
            color: white;
            background: rgba(0,0,0,0.85);
        }

        #overlay h1 { font-size: 3.5rem; margin-bottom: 10px; text-shadow: 2px 2px 5px rgba(0,0,0,0.8); }
        #overlay p { font-size: 1.5rem; margin: 10px 20px; }

        .btn-restart {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-family: inherit;
            font-weight: bold;
            color: #d81b60;
            background: #fff;
            border: none;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            cursor: pointer;
        }

        .tutorial {
            position: absolute;
            bottom: 110px;
            width: 100%;
            text-align: center;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div id="touch-zone"></div>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="hud-box" id="score-board">❤️ 0</div>
        <div class="hud-box" id="progress-board">Али: 0%</div>
        <div id="danger-warning">ТЕНЬ ДОГОНЯЕТ! 💀</div>
        <div class="tutorial">Свайпай ⬅️ ➡️ ⬆️ или жми кнопки</div>
        
        <div class="controls">
            <div class="btn" id="btn-left">◀</div>
            <div class="btn" id="btn-jump">▲</div>
            <div class="btn" id="btn-right">▶</div>
        </div>
    </div>

    <div id="overlay" style="display: none;">
        <div id="overlay-icon" style="font-size: 5rem;">💔</div>
        <h1 id="overlay-title">Поймана!</h1>
        <p id="overlay-desc">Тень разлуки настигла Фари...</p>
        <button class="btn-restart" onclick="location.reload()">Бежать снова</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        // --- НАСТРОЙКИ 3D ДВИЖКА ---
        const fov = 400; // Поле зрения (перспектива)
        const cameraHeight = 250; // Высота камеры над дорогой
        const horizonY = height * 0.35; // Линия горизонта
        let cameraZ = 0;
        let speed = 25; // Скорость бега
        let gameActive = true;
        let score = 0;
        
        const goalDistance = 30000; // Расстояние до победы

        // Полосы: -1 (левая), 0 (центр), 1 (правая)
        const laneWidth = 300; 

        // Игрок (Фари всегда находится перед камерой)
        const player = {
            lane: 0,
            visualX: width / 2,
            visualY: 0,
            jumpHeight: 0,
            jumpPhase: 0, // 0 - не прыгает, > 0 - в прыжке
            z: 200 // Зафиксированное расстояние от камеры
        };

        // Тень (Убийца любви)
        let killerDistance = -500; // Отрицательное = отстал
        let dangerTimer = 0;

        let objects = []; // Поезда, барьеры, сердечки

        // --- УПРАВЛЕНИЕ СВАЙПАМИ ---
        let startX = 0;
        let startY = 0;
        const touchZone = document.getElementById('touch-zone');

        touchZone.addEventListener('touchstart', e => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        }, {passive: false});

        touchZone.addEventListener('touchmove', e => { e.preventDefault(); }, {passive: false}); // Блокируем скролл

        touchZone.addEventListener('touchend', e => {
            if(!gameActive) return;
            let dx = e.changedTouches[0].clientX - startX;
            let dy = e.changedTouches[0].clientY - startY;
            
            if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy)) {
                // Свайп влево/вправо
                if (dx > 0 && player.lane < 1) player.lane++;
                else if (dx < 0 && player.lane > -1) player.lane--;
            } else if (dy < -40 && Math.abs(dy) > Math.abs(dx)) {
                // Свайп вверх
                if (player.jumpPhase === 0) player.jumpPhase = 0.1; // Начинаем прыжок
            }
        });

        // --- УПРАВЛЕНИЕ КНОПКАМИ ---
        function bindBtn(id, action) {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); action(); }, {passive: false});
            btn.addEventListener('mousedown', action);
        }
        bindBtn('btn-left', () => { if(player.lane > -1 && gameActive) player.lane--; });
        bindBtn('btn-right', () => { if(player.lane < 1 && gameActive) player.lane++; });
        bindBtn('btn-jump', () => { if(player.jumpPhase === 0 && gameActive) player.jumpPhase = 0.1; });

        // Управление с клавиатуры (если играть с ПК)
        window.addEventListener('keydown', (e) => {
            if(e.code === 'ArrowLeft' && player.lane > -1) player.lane--;
            if(e.code === 'ArrowRight' && player.lane < 1) player.lane++;
            if((e.code === 'ArrowUp' || e.code === 'Space') && player.jumpPhase === 0) player.jumpPhase = 0.1;
        });

        // --- ПРОЕКЦИЯ 3D В 2D ---
        // Превращаем координаты мира в координаты на экране
        function project(lane, worldZ, heightOffset = 0) {
            let z = worldZ - cameraZ;
            if (z <= 10) return null; // Объект позади камеры

            let scale = fov / z;
            let x = width / 2 + (lane * laneWidth) * scale;
            let y = horizonY + (cameraHeight - heightOffset) * scale;
            
            return { x: x, y: y, scale: scale, z: z };
        }

        // --- ГЕНЕРАЦИЯ ПРЕПЯТСТВИЙ ---
        let lastSpawnZ = 1000;
        function spawnObjects() {
            if (cameraZ > goalDistance - 2000) return; // Перед финишем чисто

            while (lastSpawnZ < cameraZ + 4000) {
                lastSpawnZ += 600 + Math.random() * 400; // Расстояние между объектами
                
                let lane = Math.floor(Math.random() * 3) - 1; // -1, 0, 1
                let rand = Math.random();

                if (rand < 0.4) {
                    objects.push({ lane: lane, z: lastSpawnZ, type: 'heart', collected: false, h: 50 });
                } else if (rand < 0.7) {
                    objects.push({ lane: lane, z: lastSpawnZ, type: 'barrier', h: 100 });
                } else {
                    objects.push({ lane: lane, z: lastSpawnZ, type: 'train', h: 300 });
                }
            }
        }

        // --- ОТРИСОВКА ПЕРСОНАЖЕЙ ---
        function drawFari(ctx, x, y, scaleFactor) {
            let w = 80 * scaleFactor;
            let h = 140 * scaleFactor;
            y -= h; // Сдвигаем вверх, чтобы координаты были ногами
            
            // Тень под ногами
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath(); ctx.ellipse(x, y + h + player.jumpHeight, w*0.6, w*0.2, 0, 0, Math.PI*2); ctx.fill();

            // Волосы (Блондинка)
            ctx.fillStyle = "#FFD700"; ctx.fillRect(x - w/2, y, w, h*0.4);
            // Лицо
            ctx.fillStyle = "#FFE4E1"; ctx.fillRect(x - w*0.4, y + h*0.1, w*0.8, h*0.3);
            // Глазки
            ctx.fillStyle = "#000"; 
            ctx.fillRect(x - w*0.2, y + h*0.2, w*0.1, h*0.05); 
            ctx.fillRect(x + w*0.1, y + h*0.2, w*0.1, h*0.05);
            // Платье (Розовое)
            ctx.fillStyle = "#FF69B4"; ctx.fillRect(x - w/2, y + h*0.4, w, h*0.4);
            
            // Анимация бега (ножки двигаются)
            let step = (player.jumpPhase === 0) ? Math.sin(cameraZ * 0.05) * (h*0.15) : 0;
            ctx.fillStyle = "#FFE4E1"; 
            ctx.fillRect(x - w*0.3, y + h*0.8, w*0.2, h*0.2 + step);
            ctx.fillRect(x + w*0.1, y + h*0.8, w*0.2, h*0.2 - step);
        }

        function drawAli(ctx, x, y, scale) {
            let w = 80 * scale; let h = 150 * scale; y -= h;
            
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath(); ctx.ellipse(x, y + h, w*0.6, w*0.2, 0, 0, Math.PI*2); ctx.fill();

            ctx.fillStyle = "#2F4F4F"; ctx.fillRect(x - w/2, y, w, h*0.3); // Волосы
            ctx.fillStyle = "#FFE4B5"; ctx.fillRect(x - w*0.4, y+h*0.1, w*0.8, h*0.3); // Лицо
            // Очки
            ctx.strokeStyle = "#000"; ctx.lineWidth = 4 * scale;
            ctx.strokeRect(x - w*0.3, y+h*0.2, w*0.25, h*0.1); 
            ctx.strokeRect(x + w*0.05, y+h*0.2, w*0.25, h*0.1);
            
            ctx.fillStyle = "#4682B4"; ctx.fillRect(x - w/2.2, y+h*0.4, w*0.9, h*0.35); // Рубашка синяя
            ctx.fillStyle = "#333"; ctx.fillRect(x - w/2.2, y+h*0.75, w*0.9, h*0.25); // Штаны черные
        }

        function gameOver(win) {
            gameActive = false;
            const overlay = document.getElementById('overlay');
            if (win) {
                overlay.style.background = 'linear-gradient(135deg, rgba(255,192,203,0.95), rgba(255,105,180,0.95))';
                document.getElementById('overlay-icon').innerText = '💑';
                document.getElementById('overlay-title').innerText = 'Победа!';
                document.getElementById('overlay-desc').innerText = `Фари добежала до Али!\nСобрано сердечек: ${score} ❤️`;
            } else {
                overlay.style.background = 'rgba(20, 0, 0, 0.95)';
                document.getElementById('overlay-icon').innerText = '🔪💔';
                document.getElementById('overlay-title').innerText = 'Поймана!';
                document.getElementById('overlay-desc').innerText = 'Тень разлуки догнала Фари...';
            }
            overlay.style.display = 'flex';
        }

        // --- ГЛАВНЫЙ ИГРОВОЙ ЦИКЛ ---
        function update() {
            if (!gameActive) return;

            cameraZ += speed;
            speed += 0.005; // Игра постепенно ускоряется!

            let progress = Math.min(100, Math.floor((cameraZ / goalDistance) * 100));
            document.getElementById('progress-board').innerText = `Али: ${progress}%`;

            // Плавное перестроение полосы игрока
            let targetX = width / 2 + (player.lane * laneWidth) * (fov / player.z);
            player.visualX += (targetX - player.visualX) * 0.2; // Lerp для плавности

            // Физика прыжка (парабола)
            if (player.jumpPhase > 0) {
                player.jumpHeight = Math.sin(player.jumpPhase) * 200; // Макс высота прыжка
                player.jumpPhase += 0.08;
                if (player.jumpPhase >= Math.PI) {
                    player.jumpPhase = 0;
                    player.jumpHeight = 0;
                }
            }

            // Логика Тени-убийцы
            if (dangerTimer > 0) {
                dangerTimer--;
                killerDistance += (50 - killerDistance) * 0.05; // Подбирается вплотную
                document.getElementById('danger-warning').style.opacity = 1;
            } else {
                killerDistance -= 2; // Если бежишь ровно, тень отстает
                if (killerDistance < -600) killerDistance = -600;
                document.getElementById('danger-warning').style.opacity = 0;
            }

            if (killerDistance > 80) gameOver(false); // Тень догнала!

            spawnObjects();

            // Проверка столкновений
            let playerAbsZ = cameraZ + player.z;

            for (let i = objects.length - 1; i >= 0; i--) {
                let obj = objects[i];
                let dz = obj.z - playerAbsZ;

                // Если объект поравнялся с игроком
                if (dz < 50 && dz > -50 && obj.lane === player.lane) {
                    
                    if (obj.type === 'heart' && !obj.collected) {
                        // Сбор сердечка (можно в прыжке или на земле)
                        obj.collected = true;
                        score++;
                        document.getElementById('score-board').innerText = `❤️ ${score}`;
                    
                    } else if (obj.type === 'barrier') {
                        // Барьер можно перепрыгнуть (если высота прыжка больше 100)
                        if (player.jumpHeight < 100) {
                            obj.type = 'broken'; // Ломаем барьер
                            player.jumpPhase = 0.1; // Отскакиваем
                            dangerTimer = 80; // Тень приближается!
                            speed *= 0.8; // Теряем скорость
                        }
                    
                    } else if (obj.type === 'train') {
                        // В поезд врезаемся насмерть
                        gameOver(false);
                    }
                }

                // Удаляем объекты, которые уехали далеко за камеру
                if (obj.z < cameraZ - 200) objects.splice(i, 1);
            }

            if (cameraZ > goalDistance + 200) gameOver(true); // Финиш!
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            // 1. Рисуем небо и горизонт
            ctx.fillStyle = '#0f0c29'; ctx.fillRect(0, 0, width, horizonY);
            ctx.fillStyle = '#302b63'; ctx.fillRect(0, horizonY - 50, width, 50); // Плавный переход

            // 2. Рисуем землю (трава по бокам)
            ctx.fillStyle = '#2c3e50'; ctx.fillRect(0, horizonY, width, height - horizonY);

            // 3. Рисуем рельсы (3 полосы)
            ctx.fillStyle = '#95a5a6'; // Цвет бетона
            let trackP1 = project(-1.5, cameraZ + 2000);
            let trackP2 = project(1.5, cameraZ + 2000);
            let trackP3 = project(1.5, cameraZ + 10);
            let trackP4 = project(-1.5, cameraZ + 10);

            if (trackP1 && trackP3) {
                ctx.beginPath();
                ctx.moveTo(trackP1.x, trackP1.y); ctx.lineTo(trackP2.x, trackP2.y);
                ctx.lineTo(trackP3.x, trackP3.y); ctx.lineTo(trackP4.x, trackP4.y);
                ctx.fill();
            }

            // Белые разделительные полосы
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 4;
            for(let l = -0.5; l <= 0.5; l += 1) {
                let pFar = project(l, cameraZ + 2000);
                let pNear = project(l, cameraZ + 10);
                if(pFar && pNear) {
                    ctx.beginPath(); ctx.moveTo(pFar.x, pFar.y); ctx.lineTo(pNear.x, pNear.y); ctx.stroke();
                }
            }

            // 4. Сортируем объекты для правильной 3D отрисовки (от дальних к ближним)
            let renderList = objects.slice();
            
            // Добавляем Али на финише
            if (cameraZ > goalDistance - 3000) {
                renderList.push({ z: goalDistance, lane: 0, type: 'ali' });
            }

            renderList.sort((a, b) => b.z - a.z);

            // 5. Отрисовка объектов
            renderList.forEach(obj => {
                let p = project(obj.lane, obj.z);
                if (!p) return;

                if (obj.type === 'heart' && !obj.collected) {
                    let hover = Math.sin((cameraZ + obj.z)*0.05) * 20 * p.scale;
                    ctx.font = `${100 * p.scale}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.fillText('❤️', p.x, p.y - (30 * p.scale) + hover);
                
                } else if (obj.type === 'barrier' || obj.type === 'broken') {
                    // Барьер: полосатая деревяшка
                    let w = 250 * p.scale; let h = 100 * p.scale;
                    ctx.fillStyle = obj.type === 'broken' ? '#555' : '#e67e22';
                    ctx.fillRect(p.x - w/2, p.y - h, w, h);
                    ctx.fillStyle = obj.type === 'broken' ? '#333' : '#d35400';
                    ctx.fillRect(p.x - w/2, p.y - h, w, 20 * p.scale); // Верхняя рейка
                    ctx.fillRect(p.x - w/2, p.y - h/2, w, 20 * p.scale); // Нижняя рейка
                
                } else if (obj.type === 'train') {
                    // Поезд: огромный синий вагон
                    let w = 280 * p.scale; let h = 300 * p.scale;
                    ctx.fillStyle = '#2980b9'; // Синий
                    ctx.fillRect(p.x - w/2, p.y - h, w, h);
                    ctx.fillStyle = '#ecf0f1'; // Окно
                    ctx.fillRect(p.x - w*0.4, p.y - h + 20*p.scale, w*0.8, h*0.4);
                    ctx.fillStyle = '#f1c40f'; // Фары
                    ctx.beginPath(); ctx.arc(p.x - w*0.3, p.y - 30*p.scale, 15*p.scale, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(p.x + w*0.3, p.y - 30*p.scale, 15*p.scale, 0, Math.PI*2); ctx.fill();
                
                } else if (obj.type === 'ali') {
                    drawAli(ctx, p.x, p.y, p.scale * 1.5); // Али чуть крупнее
                }
            });

            // 6. Отрисовка Игрока (Фари)
            // Игрок рисуется фиксированно, масштабируется в зависимости от экрана
            let baseScale = width > 600 ? 1.5 : 1.2; // На телефоне чуть меньше, на ПК крупнее
            let pY = horizonY + (cameraHeight) * (fov / player.z); // Базовая линия ног
            drawFari(ctx, player.visualX, pY - player.jumpHeight, baseScale);

            // 7. Отрисовка Убийцы (если он близко)
            if (killerDistance > -200) {
                let kP = project(player.lane, cameraZ + player.z - killerDistance);
                if (kP) {
                    let kw = 200 * kP.scale; let kh = 300 * kP.scale;
                    ctx.fillStyle = 'rgba(0,0,0,0.8)';
                    ctx.beginPath(); ctx.moveTo(kP.x, kP.y); ctx.lineTo(kP.x - kw/2, kP.y - kh); ctx.lineTo(kP.x + kw/2, kP.y - kh); ctx.fill();
                    ctx.fillStyle = '#ff0000'; // Красные глаза
                    ctx.fillRect(kP.x - kw*0.2, kP.y - kh*0.7, kw*0.1, kh*0.05);
                    ctx.fillRect(kP.x + kw*0.1, kP.y - kh*0.7, kw*0.1, kh*0.05);
                }
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        });

        // Запуск
        loop();
    </script>
</body>
</html>
