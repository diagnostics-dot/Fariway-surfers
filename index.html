<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Subway Fari ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Nunito', sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        #gameCanvas {
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .hud-box {
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 15px;
            border-radius: 20px;
            border: 3px solid #ffb6c1;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            color: #d81b60;
            font-size: 20px;
            font-weight: bold;
        }

        #score-board { top: 20px; left: 20px; }
        #progress-board { top: 20px; right: 20px; }

        #danger-warning {
            position: absolute;
            top: 80px;
            width: 100%;
            text-align: center;
            color: #ff0000;
            font-size: 24px;
            font-weight: 900;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .controls {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            pointer-events: auto;
        }

        .btn {
            width: 65px;
            height: 65px;
            background: rgba(255, 255, 255, 0.5);
            border: 3px solid #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            color: #d81b60;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .btn:active { background: rgba(255, 255, 255, 0.9); transform: scale(0.9); }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: auto;
            text-align: center;
            color: white;
            background: rgba(0,0,0,0.8);
        }

        #overlay h1 { font-size: 3rem; margin-bottom: 10px; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        #overlay p { font-size: 1.5rem; margin: 10px 20px; }

        .btn-restart {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-family: inherit;
            font-weight: bold;
            color: #d81b60;
            background: #fff;
            border: none;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        .tutorial {
            position: absolute;
            bottom: 110px;
            width: 100%;
            text-align: center;
            color: #fff;
            font-size: 18px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="hud-box" id="score-board">❤️ 0</div>
        <div class="hud-box" id="progress-board">Али: 0%</div>
        <div id="danger-warning">УБИЙЦА БЛИЗКО! 💀</div>
        <div class="tutorial">Свайпай ⬅️ ➡️ ⬆️ или жми кнопки</div>
        
        <div class="controls">
            <div class="btn" id="btn-left">◀</div>
            <div class="btn" id="btn-jump">▲</div>
            <div class="btn" id="btn-right">▶</div>
        </div>
    </div>

    <div id="overlay" style="display: none;">
        <div id="overlay-icon" style="font-size: 5rem;">💔</div>
        <h1 id="overlay-title">Поймана!</h1>
        <p id="overlay-desc">Убийца любви настиг Фари...</p>
        <button class="btn-restart" onclick="location.reload()">Попробовать снова</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        // Настройки 3D камеры
        const fov = width * 0.8;
        const cameraY = 120;
        const horizonY = height * 0.35;
        let cameraZ = 0;
        let speed = 5;
        let gameActive = true;
        let score = 0;
        
        const goalDistance = 15000; // Расстояние до Али

        // Игрок (Фари)
        const player = {
            lane: 0, // -1 (лево), 0 (центр), 1 (право)
            visualLane: 0, // Для плавного перестроения
            z: 40, // Дистанция от камеры
            yOffset: 0,
            vy: 0,
            isJumping: false
        };

        // Убийца любви
        let killerZ = -10; // Отстает от игрока (игрок на 40)
        let dangerTimer = 0;

        let objects = [];
        let particles = [];

        // Управление свайпами
        let startX = 0;
        let startY = 0;
        
        window.addEventListener('touchstart', e => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        }, {passive: false});

        window.addEventListener('touchend', e => {
            if(!gameActive) return;
            let dx = e.changedTouches[0].clientX - startX;
            let dy = e.changedTouches[0].clientY - startY;
            
            if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 30) {
                if (dx > 0 && player.lane < 1) player.lane++;
                else if (dx < 0 && player.lane > -1) player.lane--;
            } else if (dy < -30 && !player.isJumping) {
                player.vy = 18; // Прыжок
                player.isJumping = true;
            }
        });

        // Управление кнопками
        document.getElementById('btn-left').addEventListener('touchstart', (e) => { e.preventDefault(); if(player.lane > -1) player.lane--; });
        document.getElementById('btn-right').addEventListener('touchstart', (e) => { e.preventDefault(); if(player.lane < 1) player.lane++; });
        document.getElementById('btn-jump').addEventListener('touchstart', (e) => { e.preventDefault(); if(!player.isJumping) { player.vy = 18; player.isJumping = true; } });

        // Проекция 3D в 2D
        function project(lane, z, yOff = 0) {
            let dz = z - cameraZ;
            if (dz < 1) return null;
            let scale = fov / dz;
            let px = width / 2 + (lane * 120 * scale);
            let py = horizonY + ((cameraY - yOff) * scale);
            return { x: px, y: py, scale: scale, dz: dz };
        }

        function spawnObject() {
            if (cameraZ > goalDistance - 1000) return; // Перед финишем чисто

            let spawnZ = cameraZ + 600;
            let lane = Math.floor(Math.random() * 3) - 1;
            let rand = Math.random();

            if (rand < 0.3) {
                objects.push({ lane: lane, z: spawnZ, type: 'heart', collected: false });
            } else if (rand < 0.6) {
                objects.push({ lane: lane, z: spawnZ, type: 'barrier' }); // Можно перепрыгнуть
            } else if (rand < 0.8) {
                objects.push({ lane: lane, z: spawnZ, type: 'wall' }); // Нельзя перепрыгнуть
            }
        }

        // Отрисовка персонажей
        function drawFari(ctx, x, y, scale, yOffset) {
            let w = 24 * scale;
            let h = 45 * scale;
            y -= h; 
            y -= (yOffset * scale);

            // Тень
            if (yOffset > 0) {
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath(); ctx.ellipse(x, y + h + (yOffset*scale), w/1.5, w/4, 0, 0, Math.PI*2); ctx.fill();
            }

            ctx.fillStyle = "#FFD700"; ctx.fillRect(x - w/2, y, w, h*0.5); // Волосы
            ctx.fillStyle = "#FFE4E1"; ctx.fillRect(x - w/2.5, y+h*0.1, w*0.8, h*0.3); // Лицо
            ctx.fillStyle = "#000"; ctx.fillRect(x - w/4, y+h*0.2, w*0.15, h*0.05); ctx.fillRect(x + w/10, y+h*0.2, w*0.15, h*0.05); // Глаза
            ctx.fillStyle = "#FF69B4"; ctx.fillRect(x - w/2, y+h*0.4, w, h*0.4); // Платье
            
            // Анимация ног
            let step = (yOffset === 0) ? Math.sin(cameraZ * 0.05) * (h*0.2) : 0;
            ctx.fillStyle = "#FFE4E1"; 
            ctx.fillRect(x - w/3, y+h*0.8, w/4, h*0.2 + step);
            ctx.fillRect(x + w/10, y+h*0.8, w/4, h*0.2 - step);
        }

        function drawAli(ctx, x, y, scale) {
            let w = 24 * scale; let h = 50 * scale; y -= h;
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath(); ctx.ellipse(x, y + h, w/1.5, w/4, 0, 0, Math.PI*2); ctx.fill();

            ctx.fillStyle = "#2F4F4F"; ctx.fillRect(x - w/2, y, w, h*0.3); // Волосы
            ctx.fillStyle = "#FFE4B5"; ctx.fillRect(x - w/2.5, y+h*0.1, w*0.8, h*0.3); // Лицо
            
            // Очки
            ctx.strokeStyle = "#000"; ctx.lineWidth = 2 * scale;
            ctx.strokeRect(x - w/3, y+h*0.2, w*0.3, h*0.1); ctx.strokeRect(x + w/15, y+h*0.2, w*0.3, h*0.1);
            
            ctx.fillStyle = "#4682B4"; ctx.fillRect(x - w/2.2, y+h*0.4, w*0.9, h*0.35); // Рубашка
            ctx.fillStyle = "#333"; ctx.fillRect(x - w/2.2, y+h*0.75, w*0.9, h*0.25); // Штаны
        }

        function drawKiller(ctx, x, y, scale) {
            let w = 35 * scale; let h = 60 * scale; y -= h;
            
            ctx.shadowBlur = 15; ctx.shadowColor = '#000';
            ctx.fillStyle = "#111"; // Черный балахон
            ctx.beginPath();
            ctx.moveTo(x, y); ctx.lineTo(x - w/2, y + h); ctx.lineTo(x + w/2, y + h); ctx.fill();
            
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#ff0000"; // Красные злые глаза
            ctx.fillRect(x - w/4, y+h*0.3, w*0.15, h*0.05);
            ctx.fillRect(x + w/10, y+h*0.3, w*0.15, h*0.05);

            // Разбитое сердце на груди
            ctx.fillStyle = "#8b0000";
            ctx.font = `${20 * scale}px Arial`;
            ctx.textAlign = 'center';
            ctx.fillText('💔', x, y+h*0.6);
        }

        function gameOver(win) {
            gameActive = false;
            const overlay = document.getElementById('overlay');
            if (win) {
                overlay.style.background = 'rgba(255, 192, 203, 0.9)';
                document.getElementById('overlay-icon').innerText = '💑';
                document.getElementById('overlay-title').innerText = 'Победа!';
                document.getElementById('overlay-desc').innerText = `Фари нашла Али!\nСобрано: ${score} ❤️`;
            } else {
                overlay.style.background = 'rgba(0, 0, 0, 0.9)';
                document.getElementById('overlay-icon').innerText = '🔪💔';
                document.getElementById('overlay-title').innerText = 'Поймана!';
                document.getElementById('overlay-desc').innerText = 'Убийца любви забрал твои чувства...';
            }
            overlay.style.display = 'flex';
        }

        function update() {
            if (!gameActive) return;

            cameraZ += speed;
            speed += 0.001; // Постепенное ускорение

            // Прогресс бар
            let progress = Math.min(100, Math.floor((cameraZ / goalDistance) * 100));
            document.getElementById('progress-board').innerText = `Али: ${progress}%`;

            // Плавное перестроение полосы
            player.visualLane += (player.lane - player.visualLane) * 0.15;

            // Прыжок
            if (player.isJumping) {
                player.yOffset += player.vy;
                player.vy -= 1.2; // Гравитация
                if (player.yOffset <= 0) {
                    player.yOffset = 0;
                    player.isJumping = false;
                }
            }

            // Поведение Убийцы
            if (dangerTimer > 0) {
                dangerTimer--;
                killerZ += (player.z - 10 - killerZ) * 0.05; // Догоняет
                document.getElementById('danger-warning').style.opacity = 1;
            } else {
                killerZ -= 0.5; // Отстает, если играешь хорошо
                if (killerZ < -20) killerZ = -20;
                document.getElementById('danger-warning').style.opacity = 0;
            }

            if (killerZ >= player.z - 5) gameOver(false); // Убийца поймал!

            // Спавн препятствий
            if (cameraZ % 60 < speed && cameraZ < goalDistance) spawnObject();

            let playerAbsZ = cameraZ + player.z;

            // Обработка объектов
            for (let i = objects.length - 1; i >= 0; i--) {
                let obj = objects[i];
                let dz = obj.z - playerAbsZ;

                // Столкновения
                if (dz < 5 && dz > -10 && Math.abs(obj.lane - player.lane) < 0.5) {
                    if (obj.type === 'heart' && !obj.collected) {
                        obj.collected = true;
                        score++;
                        document.getElementById('score-board').innerText = `❤️ ${score}`;
                    } else if (obj.type === 'barrier') {
                        if (player.yOffset < 30) {
                            // Споткнулась
                            obj.type = 'broken';
                            player.vy = 10; player.isJumping = true; // Отскок
                            dangerTimer = 60; // Убийца приближается
                            speed *= 0.8; // Замедление
                        }
                    } else if (obj.type === 'wall') {
                        // Врезалась в стену - конец игры
                        killerZ = player.z;
                        gameOver(false);
                    }
                }

                // Удаляем объекты позади камеры
                if (obj.z < cameraZ) objects.splice(i, 1);
            }

            // Победа!
            if (cameraZ > goalDistance + player.z) {
                gameOver(true);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            // Небо
            let grad = ctx.createLinearGradient(0, 0, 0, horizonY);
            grad.addColorStop(0, '#0f0c29');
            grad.addColorStop(1, '#302b63');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, horizonY);

            // Земля
            ctx.fillStyle = '#2c3e50';
            ctx.fillRect(0, horizonY, width, height - horizonY);

            // Дорожки (Линии)
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 3;
            for(let l = -1.5; l <= 1.5; l += 1) {
                let pFar = project(l, cameraZ + 1000);
                let pNear = project(l, cameraZ + 1);
                if(pFar && pNear) {
                    ctx.beginPath(); ctx.moveTo(pFar.x, pFar.y); ctx.lineTo(pNear.x, pNear.y); ctx.stroke();
                }
            }

            // Рендер объектов (с сортировкой от дальних к ближним)
            let renderList = objects.slice();
            
            // Добавляем Али на финиш
            if (cameraZ > goalDistance - 1000) {
                renderList.push({ z: goalDistance, lane: 0, type: 'ali' });
            }

            renderList.sort((a, b) => b.z - a.z);

            renderList.forEach(obj => {
                let p = project(obj.lane, obj.z);
                if (!p) return;

                if (obj.type === 'heart' && !obj.collected) {
                    let hover = Math.sin((cameraZ + obj.z)*0.05) * 10 * p.scale;
                    ctx.font = `${30 * p.scale}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.fillText('❤️', p.x, p.y - (20 * p.scale) + hover);
                } else if (obj.type === 'barrier' || obj.type === 'broken') {
                    ctx.fillStyle = obj.type === 'broken' ? '#555' : '#e74c3c';
                    let w = 100 * p.scale; let h = 40 * p.scale;
                    ctx.fillRect(p.x - w/2, p.y - h, w, h);
                    ctx.strokeStyle = '#c0392b'; ctx.lineWidth = 2; ctx.strokeRect(p.x - w/2, p.y - h, w, h);
                } else if (obj.type === 'wall') {
                    ctx.fillStyle = '#f1c40f'; // Желтый поезд/стена
                    let w = 110 * p.scale; let h = 100 * p.scale;
                    ctx.fillRect(p.x - w/2, p.y - h, w, h);
                    ctx.fillStyle = '#333'; // Окно
                    ctx.fillRect(p.x - w/3, p.y - h + 10*p.scale, w/1.5, h/2);
                } else if (obj.type === 'ali') {
                    drawAli(ctx, p.x, p.y, p.scale);
                }
            });

            // Игрок
            let pPlayer = project(player.visualLane, cameraZ + player.z, player.yOffset);
            if (pPlayer) drawFari(ctx, pPlayer.x, pPlayer.y, pPlayer.scale, player.yOffset);

            // Убийца
            let pKiller = project(player.visualLane, cameraZ + killerZ);
            if (pKiller && killerZ > -15) { // Рисуем только если он близко
                drawKiller(ctx, pKiller.x, pKiller.y, pKiller.scale);
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        });

        loop();
    </script>
</body>
</html>
